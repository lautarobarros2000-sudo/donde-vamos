<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f0f">
  <title>¿Dónde vamos?</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="app">

    <header>
      <h1>¿Dónde vamos?</h1>
      <button id="btn-add" onclick="openAddModal()">+ Agregar</button>
    </header>

    <div class="controls">
      <input type="search" id="search-input" placeholder="Buscar lugar o barrio..." oninput="filterPlaces()" autocomplete="off">
      <div class="status-tabs">
        <button class="tab active" data-status="todos" onclick="setStatusFilter('todos', this)">Todos</button>
        <button class="tab" data-status="quiero ir" onclick="setStatusFilter('quiero ir', this)">Quiero ir</button>
        <button class="tab" data-status="ya fui" onclick="setStatusFilter('ya fui', this)">Ya fui</button>
      </div>
    </div>

    <div class="categories" id="categories"></div>

    <div class="top-bar">
      <span id="stats" class="stats-inline"></span>
      <button id="btn-random" onclick="randomPlace()">🎲 Sorpresa</button>
    </div>

    <div class="places-grid" id="places-grid">
      <div class="loading">Cargando lugares...</div>
    </div>

  </div>

  <!-- Modal Detalle -->
  <div id="modal-detail" class="modal hidden" onclick="handleModalBackdrop(event, 'modal-detail')">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <button class="modal-close" onclick="closeModal('modal-detail')">✕</button>
      <div id="modal-detail-content" class="modal-body"></div>
    </div>
  </div>

  <!-- Modal Agregar -->
  <div id="modal-add" class="modal hidden" onclick="handleModalBackdrop(event, 'modal-add')">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <button class="modal-close" onclick="closeModal('modal-add')">✕</button>
      <div class="modal-body">
        <h2 class="modal-title">Agregar lugar</h2>
        <form id="add-form" onsubmit="addPlace(event)">
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="new-name" required placeholder="Ej: Horta">
          </div>
          <div class="form-group">
            <label>Barrio</label>
            <input type="text" id="new-neighborhood" placeholder="Ej: Villa Crespo">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Categoría</label>
              <select id="new-category">
                <option value="Resto">Resto</option>
                <option value="Chill">Chill</option>
                <option value="Pastas">Pastas</option>
                <option value="Clásicos ⭐️">Clásicos ⭐️</option>
                <option value="Platitos">Platitos</option>
                <option value="Vinilos">Vinilos</option>
                <option value="Bares">Bares</option>
                <option value="Rooftop">Rooftop</option>
                <option value="Casual">Casual</option>
                <option value="Asiático">Asiático</option>
              </select>
            </div>
            <div class="form-group">
              <label>Agregado por</label>
              <select id="new-added-by">
                <option value="Lauti">Lauti</option>
                <option value="Pipu">Pipu</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Notas</label>
            <textarea id="new-notes" placeholder="Por qué querés ir, qué te dijeron..."></textarea>
          </div>
          <button type="submit" class="btn-primary" id="btn-save">Guardar lugar</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
