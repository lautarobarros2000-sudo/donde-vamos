<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="¿Dónde vamos?">
  <meta name="theme-color" content="#8B2230">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="manifest" href="site.webmanifest">
  <title>¿Dónde vamos?</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="app">

    <!-- ── VIEW: HOME ── -->
    <div id="view-home">
      <header class="home-header">
        <h1>¿Dónde vamos?</h1>
        <div class="header-actions">
          <button class="icon-btn" id="btn-edit-mode" onclick="toggleEditMode()" title="Editar categorías">✎</button>
          <button class="icon-btn accent" onclick="openPlaceModal(null, null)" title="Agregar lugar">+</button>
        </div>
      </header>

      <div class="search-wrap">
        <input type="search" id="search-input" placeholder="Buscar lugar..." oninput="onSearch(this.value)" autocomplete="off">
      </div>

      <div id="search-results" class="hidden">
        <div class="section-label">Resultados</div>
        <div id="search-grid" class="places-list"></div>
      </div>

      <div id="cat-section">
        <div id="cat-grid" class="cat-grid"></div>
        <button class="add-cat-btn" onclick="openCategoryModal(null)">+ Nueva categoría</button>
      </div>
    </div>

    <!-- ── VIEW: CATEGORY ── -->
    <div id="view-category" class="hidden">
      <header class="cat-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div id="cat-header-info" class="cat-header-info"></div>
        <button class="icon-btn accent" onclick="openPlaceModal(null, currentCategoryId)">+</button>
      </header>

      <div class="status-tabs">
        <button class="tab active" onclick="setFilter('todos', this)">Todos</button>
        <button class="tab" onclick="setFilter('quiero ir', this)">Quiero ir</button>
        <button class="tab" onclick="setFilter('ya fui', this)">Ya fui</button>
      </div>

      <div id="cat-places-list" class="places-list"></div>
    </div>

  </div>

  <!-- ── MODAL: Place Detail ── -->
  <div id="modal-place" class="modal hidden" onclick="backdropClose(event,'modal-place')">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <button class="modal-close" onclick="closeModal('modal-place')">✕</button>
      <div id="modal-place-body" class="modal-body"></div>
    </div>
  </div>

  <!-- ── MODAL: Add/Edit Place ── -->
  <div id="modal-add-place" class="modal hidden" onclick="backdropClose(event,'modal-add-place')">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <button class="modal-close" onclick="closeModal('modal-add-place')">✕</button>
      <div class="modal-body">
        <h2 class="modal-title" id="add-place-title">Agregar lugar</h2>
        <form id="add-place-form" onsubmit="savePlace(event)">
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="fp-name" required placeholder="Ej: Horta">
          </div>
          <div class="form-group">
            <label>Barrio</label>
            <input type="text" id="fp-neighborhood" placeholder="Ej: Villa Crespo">
          </div>
          <div class="form-group">
            <label>Instagram</label>
            <div class="input-prefix">
              <span>@</span>
              <input type="text" id="fp-instagram" placeholder="handle (opcional)" autocomplete="off" autocorrect="off" autocapitalize="off">
            </div>
          </div>
          <div class="form-group">
            <label>Categorías</label>
            <div id="fp-categories" class="cat-checks"></div>
          </div>
          <div class="form-group">
            <label>Notas</label>
            <textarea id="fp-notes" placeholder="Por qué querés ir, qué te dijeron..."></textarea>
          </div>
          <div class="form-group">
            <label>Agregado por</label>
            <div class="user-toggle">
              <button type="button" class="user-btn active" data-user="Lauti" onclick="pickUser(this,'add-place-form')">Lauti</button>
              <button type="button" class="user-btn" data-user="Pipu" onclick="pickUser(this,'add-place-form')">Pipu</button>
            </div>
          </div>
          <input type="hidden" id="fp-id">
          <input type="hidden" id="fp-precat">
          <button type="submit" class="btn-primary" id="btn-save-place">Guardar</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ── MODAL: Review ── -->
  <div id="modal-review" class="modal hidden" onclick="backdropClose(event,'modal-review')">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <button class="modal-close" onclick="closeModal('modal-review')">✕</button>
      <div class="modal-body">
        <h2 class="modal-title">Mi review</h2>
        <form id="review-form" onsubmit="saveReview(event)">
          <div class="form-group">
            <label>¿Quién sos?</label>
            <div class="user-toggle">
              <button type="button" class="user-btn active" data-user="Lauti" onclick="pickUser(this,'review-form')">Lauti</button>
              <button type="button" class="user-btn" data-user="Pipu" onclick="pickUser(this,'review-form')">Pipu</button>
            </div>
          </div>
          <div class="form-group">
            <label>Rating</label>
            <div class="star-row" id="review-stars">
              <span class="star" data-n="1" onclick="setReviewRating(1)">★</span>
              <span class="star" data-n="2" onclick="setReviewRating(2)">★</span>
              <span class="star" data-n="3" onclick="setReviewRating(3)">★</span>
              <span class="star" data-n="4" onclick="setReviewRating(4)">★</span>
              <span class="star" data-n="5" onclick="setReviewRating(5)">★</span>
            </div>
          </div>
          <div class="form-group">
            <label>Platos que comimos</label>
            <textarea id="fr-dishes" placeholder="Ej: burrata, tagliatelle al ragú..."></textarea>
          </div>
          <div class="form-group">
            <label>Notas</label>
            <textarea id="fr-notes" placeholder="Cómo estuvo, qué nos gustó..."></textarea>
          </div>
          <input type="hidden" id="fr-place-id">
          <button type="submit" class="btn-primary">Guardar review</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ── MODAL: Category ── -->
  <div id="modal-category" class="modal hidden" onclick="backdropClose(event,'modal-category')">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <button class="modal-close" onclick="closeModal('modal-category')">✕</button>
      <div class="modal-body">
        <h2 class="modal-title" id="cat-modal-title">Nueva categoría</h2>
        <form id="cat-form" onsubmit="saveCategory(event)">
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="fc-name" required placeholder="Ej: Brunch">
          </div>
          <div class="form-group">
            <label>Emoji</label>
            <input type="text" id="fc-emoji" placeholder="🍽️" maxlength="4">
          </div>
          <div class="form-group">
            <label>Color</label>
            <div id="color-grid" class="color-grid"></div>
          </div>
          <input type="hidden" id="fc-id">
          <button type="submit" class="btn-primary">Guardar categoría</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
